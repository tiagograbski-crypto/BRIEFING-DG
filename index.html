<!DOCTYPE html>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cinzel:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;700;900&family=Lato:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,700;1,400&family=Montserrat:ital,wght@0,400;0,700;0,900;1,400&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Roboto:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, memo, useCallback, useRef } = React;

        // --- SISTEMA DE ÍCONES NATIVO ---
        const Icon = ({ name, size = 24, className = "", strokeWidth = 2 }) => {
            const icons = {
                zap: <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />,
                shieldCheck: <><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4" /></>,
                globe: <><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></>,
                arrowRight: <><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></>,
                moon: <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>,

                heading: <path d="M4 12h16M4 18V6M20 18V6"/>,
                type: <><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></>,
                checkCircle: <><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>,
                pointer: <><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/><path d="M13 13l6 6"/></>,
                layers: <><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 12 12 17 22 12"/><polyline points="2 17 12 22 22 17"/></>,
                check: <polyline points="20 6 9 17 4 12"/>,
                refresh: <><polyline points="1 4 1 10 7 10"/><polyline points="23 20 23 14 17 14"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10M3.51 15A9 9 0 0 0 18.36 18.36L23 14"/></>,
                download: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>,
                smartphone: <><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></>,
                monitor: <><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></>,
                lock: <><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></>,
                users: <><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>,
                image: <><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></>,
                message: <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>,
                help: <><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></>,
                settings: <><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></>
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || icons.globe}
                </svg>
            );
        };

        // --- LÓGICA DE CONTRASTE WCAG ---
        const getContrastColor = (hexColor) => {
            if (!hexColor) return '#000000';
            const hex = hexColor.replace('#', '');
            const r = parseInt(hex.substr(0, 2), 16);
            const g = parseInt(hex.substr(2, 2), 16);
            const b = parseInt(hex.substr(4, 2), 16);
            const yiq = ((r * 299) + (g * 587) + (b * 114)) / 1000;
            return yiq >= 128 ? '#000000' : '#FFFFFF'; 
        };

        // --- DIRETRIZ TIPOGRÁFICA ---
        const TITLE_FONTS = [
            { id: 'playfair', name: 'Playfair Display', format: 'Serifada Clássica', family: '"Playfair Display", serif' },
            { id: 'cinzel', name: 'Cinzel', format: 'Serifada Imponente', family: '"Cinzel", serif' },
            { id: 'montserrat', name: 'Montserrat', format: 'Sans Geométrica', family: '"Montserrat", sans-serif' },
            { id: 'bebas', name: 'Bebas Neue', format: 'Display Urbana', family: '"Bebas Neue", impact, sans-serif' },
            { id: 'inter', name: 'Inter Tight', format: 'Sans Tecnológica', family: '"Inter", sans-serif' },
            { id: 'cormorant', name: 'Cormorant', format: 'Serifada Editorial', family: '"Cormorant Garamond", serif' },
        ];

        const DESC_FONTS = [
            { id: 'inter', name: 'Inter', format: 'Alta Legibilidade', family: '"Inter", sans-serif' },
            { id: 'lato', name: 'Lato', format: 'Arredondada', family: '"Lato", sans-serif' },
            { id: 'roboto', name: 'Roboto', format: 'Técnica/Neutra', family: '"Roboto", sans-serif' },
            { id: 'lora', name: 'Lora', format: 'Serifada Suave', family: '"Lora", serif' },
        ];

        const PAGE_MODULES = [
            { id: 'about', label: 'Conceito / O Espaço', icon: 'users' },
            { id: 'gallery', label: 'Portfólio de Resultados', icon: 'image' },
            { id: 'testimonials', label: 'Selo de Autoridade', icon: 'message' },
            { id: 'faq', label: 'FAQ Estratégico', icon: 'help' },
        ];

        // URLs de Imagens da GL Pro
        const GL_PRO_BANNER = "https://ultraglospro.carrd.co/assets/images/image01.jpg?v=e1be0335";
        const GL_PRO_LOGO = "https://ultraglospro.carrd.co/assets/images/image02.jpg?v=e1be0335";

        // --- MINI MOCKUPS PARA ESCOLHA DE LAYOUT ---
        const MiniLayoutWireframe = ({ type, color }) => {
            return (
                <div className="w-16 h-12 bg-zinc-950 border border-zinc-800 rounded-md overflow-hidden flex p-1.5 gap-1.5 shrink-0">
                {type === 'classic-left' && (
                    <React.Fragment>
                    <div className="flex-1 flex flex-col justify-center gap-1">
                        <div className="h-1.5 w-8 rounded-full" style={{ backgroundColor: color }} />
                        <div className="h-1 w-full bg-zinc-700 rounded-full" />
                        <div className="h-1 w-4/5 bg-zinc-700 rounded-full" />
                        <div className="h-2 w-6 mt-1 rounded bg-zinc-600" />
                    </div>
                    <div className="w-6 h-full bg-zinc-800 rounded-sm" />
                    </React.Fragment>
                )}
                {type === 'centered-impact' && (
                    <div className="flex-1 flex flex-col items-center justify-center gap-1">
                    <div className="h-1.5 w-10 rounded-full" style={{ backgroundColor: color }} />
                    <div className="h-1 w-10 bg-zinc-700 rounded-full" />
                    <div className="h-2 w-8 mt-1 rounded bg-zinc-600" />
                    </div>
                )}
                {type === 'split-screen' && (
                    <React.Fragment>
                    <div className="w-6 h-full bg-zinc-800 rounded-sm" style={{ borderLeft: `2px solid ${color}` }}/>
                    <div className="flex-1 flex flex-col justify-center gap-1">
                        <div className="h-1.5 w-6 rounded-full" style={{ backgroundColor: color }} />
                        <div className="h-1 w-full bg-zinc-700 rounded-full" />
                        <div className="h-2 w-6 mt-1 rounded bg-zinc-600" />
                    </div>
                    </React.Fragment>
                )}
                {type === 'immersive-bottom' && (
                    <div className="flex-1 relative bg-zinc-800 rounded-sm p-1 flex flex-col justify-end">
                    <div className="h-1.5 w-8 rounded-full mb-0.5" style={{ backgroundColor: color }} />
                    <div className="h-1 w-full bg-zinc-600 rounded-full" />
                    </div>
                )}
                </div>
            );
        };

        // --- MOCKUP OMNICHANNEL (Transição Suave Desktop & Mobile) ---
        const ImmersiveMockup = memo(({ formData, viewMode }) => {
            const { primaryColor, secondaryColor, accentColor, surfaceColor, titleFont, descFont, heroStyle, sections } = formData;
            const buttonTextColor = getContrastColor(secondaryColor);
            const desktopRef = useRef(null);
            const mobileRef = useRef(null);

            useEffect(() => {
                if (viewMode === 'desktop' && desktopRef.current) {
                desktopRef.current.scrollTo({ top: desktopRef.current.scrollHeight, behavior: 'smooth' });
                } else if (viewMode === 'mobile' && mobileRef.current) {
                mobileRef.current.scrollTo({ top: mobileRef.current.scrollHeight, behavior: 'smooth' });
                }
            }, [sections, viewMode]);

            const titleFontFamily = TITLE_FONTS.find(f => f.id === titleFont)?.family || 'sans-serif';
            const descFontFamily = DESC_FONTS.find(f => f.id === descFont)?.family || 'sans-serif';

            return (
                <div className="relative w-full h-full flex items-center justify-center overflow-hidden">
                
                {/* ===================== RENDER: DESKTOP ===================== */}
                <div 
                    className={`absolute flex items-center justify-center transition-all duration-1000 ease-[cubic-bezier(0.25,1,0.5,1)] origin-center w-full h-full
                    ${viewMode === 'desktop' ? 'opacity-100 scale-[0.5] md:scale-[0.6] lg:scale-[0.8] z-20' : 'opacity-0 scale-[0.4] pointer-events-none z-0'}
                    `}
                >
                    <div className="absolute w-[800px] h-[400px] rounded-[100%] blur-[100px] opacity-20 animate-pulse" style={{ backgroundColor: accentColor }} />
                    
                    <div className="relative z-20 w-[900px] h-[550px] bg-zinc-800 rounded-xl shadow-[0_40px_100px_-20px_rgba(0,0,0,1)] border border-zinc-700 flex flex-col overflow-hidden">
                    
                    <div className="h-8 bg-zinc-900 flex items-center px-4 gap-2 border-b border-zinc-800 shrink-0">
                        <div className="w-3 h-3 rounded-full bg-red-500/80" />
                        <div className="w-3 h-3 rounded-full bg-yellow-500/80" />
                        <div className="w-3 h-3 rounded-full bg-green-500/80" />
                        <div className="mx-auto flex items-center gap-2 px-3 py-1 bg-zinc-800 rounded text-[9px] font-mono text-zinc-500">
                        <Icon name="lock" size={10} /> {formData.nome ? formData.nome.toLowerCase().replace(/\s/g, '') : 'suamarca'}.com.br
                        </div>
                    </div>

                    <div ref={desktopRef} className="flex-1 overflow-y-auto no-scrollbar relative transition-colors duration-500" style={{ backgroundColor: primaryColor }}>
                        
                        <header className="flex justify-between items-center px-16 py-8 opacity-70 relative z-20">
                        <div className="font-black text-xl uppercase italic tracking-tighter" style={{ color: surfaceColor, fontFamily: titleFontFamily }}>
                            {formData.nome || 'SUA_MARCA'} <span style={{ color: accentColor }}>.</span>
                        </div>
                        <div className="flex gap-8 text-[11px] font-bold tracking-widest uppercase" style={{ color: surfaceColor, fontFamily: descFontFamily }}>
                            <span>Início</span>
                            <span>Sobre</span>
                            <span>Portfólio</span>
                            <span style={{ color: accentColor }}>Agendar</span>
                        </div>
                        </header>

                        <div className="px-16 py-12 flex items-center min-h-[350px]">
                        {heroStyle === 'classic-left' && (
                            <div className="flex w-full gap-12 items-center">
                            <div className="w-1/2 flex flex-col items-start text-left relative z-10">
                                <div className="h-1.5 w-16 mb-6 rounded-full" style={{ backgroundColor: accentColor }} />
                                <h5 className="text-5xl leading-[1.1] font-black italic tracking-tighter uppercase mb-6" style={{ color: surfaceColor, fontFamily: titleFontFamily }}>
                                {formData.nome || 'Seu'} <br/> <span style={{ color: accentColor }}>{formData.nicho || 'Posicionamento'}</span>
                                </h5>
                                <div className="space-y-3 w-4/5 opacity-50 mb-10">
                                <div className="h-2 w-full rounded-full" style={{ backgroundColor: surfaceColor }} />
                                <div className="h-2 w-5/6 rounded-full" style={{ backgroundColor: surfaceColor }} />
                                </div>
                                <div className="h-14 w-64 rounded-lg flex items-center justify-center text-xs font-black tracking-[0.2em] uppercase italic shadow-xl transition-all" style={{ backgroundColor: secondaryColor, color: buttonTextColor, fontFamily: descFontFamily }}>
                                Agendar Experiência
                                </div>
                            </div>
                            <div className="w-1/2 h-72 rounded-2xl border border-white/10 overflow-hidden bg-black/40 relative shadow-2xl">
                                <img src={GL_PRO_BANNER} alt="Banner" className="w-full h-full object-cover opacity-80 mix-blend-luminosity hover:mix-blend-normal transition-all duration-700" />
                                <div className="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent pointer-events-none"></div>
                            </div>
                            </div>
                        )}

                        {heroStyle === 'centered-impact' && (
                            <div className="w-full flex flex-col items-center text-center justify-center relative py-16 rounded-3xl overflow-hidden border border-white/5 bg-black/20 shadow-xl">
                            <img src={GL_PRO_BANNER} alt="Banner Fundo" className="absolute inset-0 w-full h-full object-cover opacity-20 mix-blend-overlay" />
                            <div className="absolute inset-0 bg-gradient-to-b from-transparent to-black/60"></div>
                            
                            <div className="relative z-10 flex flex-col items-center">
                                <div className="h-1.5 w-16 mb-6 rounded-full" style={{ backgroundColor: accentColor }} />
                                <h5 className="text-6xl leading-[1.1] font-black italic tracking-tighter uppercase mb-6 drop-shadow-lg" style={{ color: surfaceColor, fontFamily: titleFontFamily }}>
                                    {formData.nome || 'Seu'} <span style={{ color: accentColor }}>{formData.nicho || 'Posicionamento'}</span>
                                </h5>
                                <div className="space-y-3 w-1/2 mx-auto opacity-70 mb-10">
                                    <div className="h-2 w-full rounded-full shadow" style={{ backgroundColor: surfaceColor }} />
                                    <div className="h-2 w-3/4 mx-auto rounded-full shadow" style={{ backgroundColor: surfaceColor }} />
                                </div>
                                <div className="h-16 w-72 rounded-2xl flex items-center justify-center text-xs font-black tracking-[0.2em] uppercase italic shadow-2xl transition-all" style={{ backgroundColor: secondaryColor, color: buttonTextColor, fontFamily: descFontFamily }}>
                                    Agendar Experiência
                                </div>
                            </div>
                            </div>
                        )}

                        {heroStyle === 'split-screen' && (
                            <div className="flex w-full h-[350px] rounded-3xl overflow-hidden border border-white/10 shadow-2xl bg-black/40">
                            <div className="w-1/2 h-full flex items-end p-8 relative overflow-hidden" style={{ borderLeft: `6px solid ${accentColor}` }}>
                                <img src={GL_PRO_BANNER} alt="Banner Esq" className="absolute inset-0 w-full h-full object-cover opacity-60 mix-blend-screen" />
                                <div className="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent"></div>
                                <div className="relative z-10 h-3 w-32 bg-black/50 backdrop-blur-md rounded-full border border-white/10" />
                            </div>
                            <div className="w-1/2 h-full flex flex-col justify-center p-12 bg-black/20 backdrop-blur-sm relative z-10">
                                <h5 className="text-4xl leading-[1.1] font-black italic tracking-tighter uppercase mb-6" style={{ color: surfaceColor, fontFamily: titleFontFamily }}>
                                A Essência <br/><span style={{ color: accentColor }}>{formData.nicho || 'Premium'}</span>
                                </h5>
                                <div className="h-14 w-56 rounded-lg flex items-center justify-center text-[10px] font-black tracking-[0.2em] uppercase italic mt-6 shadow-lg" style={{ backgroundColor: secondaryColor, color: buttonTextColor }}>
                                Iniciar Atendimento
                                </div>
                            </div>
                            </div>
                        )}

                        {heroStyle === 'immersive-bottom' && (
                            <div className="w-full h-[400px] rounded-3xl relative overflow-hidden flex items-end p-12 border border-white/5 shadow-2xl">
                            <img src={GL_PRO_BANNER} alt="Banner Imersivo" className="absolute inset-0 w-full h-full object-cover opacity-50" />
                            <div className="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-transparent" />
                            
                            <div className="relative z-10 w-full flex justify-between items-end drop-shadow-2xl">
                                <h5 className="text-5xl leading-[1.1] font-black italic tracking-tighter uppercase" style={{ color: surfaceColor, fontFamily: titleFontFamily }}>
                                {formData.nome || 'Seu'} <br/><span style={{ color: accentColor }}>{formData.nicho || 'Posicionamento'}</span>
                                </h5>
                                <div className="h-16 w-64 rounded-xl flex items-center justify-center text-xs font-black tracking-[0.2em] uppercase italic shadow-2xl" style={{ backgroundColor: secondaryColor, color: buttonTextColor }}>
                                Agendar
                                </div>
                            </div>
                            </div>
                        )}
                        </div>

                        <div className="px-16 pt-12 pb-20 relative z-10">
                        {sections.includes('about') && (
                            <div className="flex gap-12 mb-16 animate-in fade-in">
                            <div className="w-1/3 h-48 rounded-xl border border-white/10 overflow-hidden bg-black/40 flex items-center justify-center p-6 shadow-xl relative">
                                <img src={GL_PRO_LOGO} alt="Logo Holding" className="max-w-full max-h-full object-contain opacity-90 drop-shadow-md z-10" />
                                <div className="absolute inset-0 bg-gradient-to-br from-white/5 to-transparent pointer-events-none"></div>
                            </div>
                            <div className="w-2/3 flex flex-col justify-center">
                                <div className="h-6 w-48 rounded mb-6 opacity-80 shadow-sm" style={{ backgroundColor: surfaceColor }} />
                                <div className="h-2 w-full rounded mb-3 opacity-30" style={{ backgroundColor: surfaceColor }} />
                                <div className="h-2 w-full rounded mb-3 opacity-30" style={{ backgroundColor: surfaceColor }} />
                                <div className="h-2 w-3/4 rounded opacity-30" style={{ backgroundColor: surfaceColor }} />
                            </div>
                            </div>
                        )}
                        </div>
                    </div>
                    </div>
                </div>

                {/* ===================== RENDER: MOBILE (IPHONE 17 PRO) ===================== */}
                <div 
                    className={`absolute flex items-center justify-center transition-all duration-1000 ease-[cubic-bezier(0.25,1,0.5,1)] origin-center w-full h-full
                    ${viewMode === 'mobile' ? 'opacity-100 scale-[0.7] md:scale-[0.9] lg:scale-100 z-20' : 'opacity-0 scale-[1.2] pointer-events-none z-0'}
                    `}
                >
                    <div className="absolute w-[400px] h-[400px] rounded-full blur-[100px] opacity-20 animate-pulse" style={{ backgroundColor: accentColor }} />
                    
                    <div className="relative z-20 w-[300px] lg:w-[320px] h-[600px] lg:h-[650px] bg-zinc-900 rounded-[3.8rem] p-3 shadow-[0_40px_100px_-20px_rgba(0,0,0,1)] border border-zinc-800/80 backdrop-blur-3xl">
                    <div className="w-full h-full rounded-[3rem] overflow-hidden flex flex-col relative transition-colors duration-500 border border-white/5" style={{ backgroundColor: primaryColor }}>
                        
                        <div className="absolute top-4 left-1/2 -translate-x-1/2 w-24 lg:w-28 h-7 lg:h-8 bg-black rounded-full z-50 flex items-center justify-center shadow-md border border-white/5">

                                key={module.id}
                                onClick={() => toggleSection(module.id)}
                                className={`p-4 lg:p-5 rounded-2xl border text-left transition-all flex items-center justify-between group ${isActive ? 'border-[#CCFF00] bg-[#CCFF00]/5' : 'border-zinc-800 bg-zinc-900/30'}`}
                                >
                                <div className="flex items-center gap-3 lg:gap-4">
                                    <div className={`p-2 lg:p-3 rounded-xl transition-colors flex items-center justify-center ${isActive ? 'bg-[#CCFF00] text-black' : 'bg-zinc-800 text-zinc-400'}`}>
                                      <Icon name={module.icon} size={16} />
                                    </div>
                                    <span className={`font-black text-[10px] lg:text-xs uppercase tracking-widest italic ${isActive ? 'text-zinc-100' : 'text-zinc-400'}`}>
                                    {module.label}
                                    </span>
                                </div>
                                <div className={`w-5 h-5 lg:w-6 lg:h-6 rounded-full border flex items-center justify-center transition-colors ${isActive ? 'bg-[#CCFF00] border-[#CCFF00] text-black' : 'border-zinc-700 text-transparent'}`}>
                                    <Icon name="check" size={12} strokeWidth={3} />
                                </div>
                                </button>
                            );
                            })}
                        </div>

                        <div className="flex justify-between items-center pt-6 lg:pt-8 border-t border-zinc-900">
                            <button onClick={() => setStep(3)} className="text-zinc-500 hover:text-zinc-300 text-[10px] font-black uppercase italic">Voltar</button>
                            <button onClick={() => triggerHaptic(5)} className="px-8 lg:px-10 py-4 lg:py-5 bg-white text-black font-black rounded-2xl uppercase italic text-[10px] lg:text-xs shadow-xl">Revisar & Finalizar</button>
                        </div>
                        </div>
                    )}

                    {step === 5 && (
                        <div className="space-y-8 lg:space-y-10 animate-in fade-in slide-in-from-right-8 duration-500 text-center py-10 lg:py-16 pb-12">
                        <div className="p-6 lg:p-8 bg-[#CCFF00]/10 border border-[#CCFF00]/30 rounded-full inline-block mb-2 lg:mb-4 shadow-[0_0_40px_rgba(204,255,0,0.15)]">
                            <Icon name="shieldCheck" size={48} className="text-[#CCFF00]" />
                        </div>
                        <h3 className="text-4xl lg:text-[3.5rem] leading-[0.9] font-black italic uppercase tracking-tighter text-zinc-100">Protocolo <br/> Concluído.</h3>
                        <p className="text-zinc-400 max-w-[280px] mx-auto text-xs lg:text-sm italic leading-relaxed">
                            O GLID extraiu seu posicionamento. Sua Identidade Digital está pronta para renderização.
                        </p>
                        
                        <button 
                            onClick={handleExportJSON}
                            disabled={isExporting}
                            className="w-full py-5 lg:py-6 bg-[#CCFF00] text-black font-black rounded-3xl text-xs lg:text-sm uppercase tracking-widest italic shadow-xl shadow-[#CCFF00]/20 hover:scale-[1.02] active:scale-95 transition-all mt-6 lg:mt-8 flex items-center justify-center gap-3 disabled:opacity-50"
                        >
                            {isExporting ? (
                                <React.Fragment> <Icon name="refresh" size={16} className="animate-spin" /> Gerando Blueprint... </React.Fragment>
                            ) : (
                                <React.Fragment> <Icon name="download" size={16} /> Exportar Arquivo JSON </React.Fragment>
                            )}
                        </button>
                        </div>
                    )}
                    </section>

                    {/* LADO DIREITO: MOCKUP OMNICHANNEL 100% FIXO */}
                    <section className="hidden landscape:flex lg:flex w-full lg:col-span-7 flex-col items-center justify-center bg-[#050505] h-full overflow-hidden relative">
                    
                    <div className="absolute top-8 right-12 z-50 flex items-center bg-zinc-900/90 border border-zinc-800 rounded-full p-1 backdrop-blur-xl shadow-2xl">
                        <button 
                        onClick={() => setViewMode('mobile')} 
                        className={`flex items-center gap-2 px-4 py-2 rounded-full text-[9px] font-black uppercase tracking-widest transition-all ${viewMode === 'mobile' ? 'bg-zinc-800 text-[#CCFF00]' : 'text-zinc-500 hover:text-white'}`}
                        >
                        <Icon name="smartphone" size={14} /> Celular
                        </button>
                        <button 
                        onClick={() => setViewMode('desktop')} 
                        className={`flex items-center gap-2 px-4 py-2 rounded-full text-[9px] font-black uppercase tracking-widest transition-all ${viewMode === 'desktop' ? 'bg-zinc-800 text-[#CCFF00]' : 'text-zinc-500 hover:text-white'}`}
                        >
                        <Icon name="monitor" size={14} /> Computador
                        </button>
                    </div>

                    <ImmersiveMockup formData={formData} viewMode={viewMode} />
                    </section>

                </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
