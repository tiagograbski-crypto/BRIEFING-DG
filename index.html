    <style>
        /* Melhoria Mobile: Momentum Scrolling para iOS */
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        body { background-color: #050505; color: #F8F9FA; overflow: hidden; }
        
        /* Utilitários de Efeito Vidro e Animações */
        .glass-effect {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
        .glass-button {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-button:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 10px 40px -10px rgba(255,255,255,0.15);
            background: rgba(255, 255, 255, 0.1);
        }

        /* Toggle Customizado */
        .toggle-checkbox:checked { right: 0; border-color: #CCFF00; }
        .toggle-checkbox:checked + .toggle-label { background-color: #CCFF00; }
        .toggle-checkbox:checked + .toggle-label:after { transform: translateX(100%); border-color: white; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, memo, useCallback, useRef } = React;

        // --- SISTEMA DE ÍCONES NATIVO ---
        const Icon = ({ name, size = 24, className = "", strokeWidth = 2 }) => {
            const icons = {
                zap: <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />,
                shieldCheck: <><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4" /></>,
                globe: <><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></>,
                arrowRight: <><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></>,
                heading: <path d="M4 12h16M4 18V6M20 18V6"/>,
                type: <><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></>,
                layers: <><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 12 12 17 22 12"/><polyline points="2 17 12 22 22 17"/></>,
                check: <polyline points="20 6 9 17 4 12"/>,
                refresh: <><polyline points="1 4 1 10 7 10"/><polyline points="23 20 23 14 17 14"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10M3.51 15A9 9 0 0 0 18.36 18.36L23 14"/></>,
                download: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>,
                smartphone: <><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></>,
                monitor: <><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></>,
                lock: <><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></>,
                users: <><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>,
                image: <><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></>,
                message: <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>,
                help: <><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></>,
                settings: <><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></>,
                plus: <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
                trash: <><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></>,
                whatsapp: <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || icons.globe}
                </svg>
            );
        };

        const getContrastColor = (hexColor) => {
            if (!hexColor) return '#000000';
            const hex = hexColor.replace('#', '');
            const r = parseInt(hex.substr(0, 2), 16);
            const g = parseInt(hex.substr(2, 2), 16);
            const b = parseInt(hex.substr(4, 2), 16);
            const yiq = ((r * 299) + (g * 587) + (b * 114)) / 1000;
            return yiq >= 128 ? '#000000' : '#FFFFFF'; 
        };

        // --- NEURO-TIPOGRAFIA: Foco em Retenção e Conversão ---
        const TITLE_FONTS = [
            { id: 'cinzel', name: 'Cinzel', format: 'Imponente', neuro: 'Foco em Alto Ticket', family: '"Cinzel", serif' },
            { id: 'playfair', name: 'Playfair Display', format: 'Serifada Clássica', neuro: 'Percepção de Luxo', family: '"Playfair Display", serif' },
            { id: 'montserrat', name: 'Montserrat', format: 'Geométrica', neuro: 'Leitura Imersiva', family: '"Montserrat", sans-serif' },
            { id: 'inter', name: 'Inter Tight', format: 'Tecnológica', neuro: 'Conexão Moderna', family: '"Inter", sans-serif' },
            { id: 'bebas', name: 'Bebas Neue', format: 'Urbana', neuro: 'Impacto Direto', family: '"Bebas Neue", impact, sans-serif' },
            { id: 'cormorant', name: 'Cormorant', format: 'Editorial', neuro: 'Elegância Fina', family: '"Cormorant Garamond", serif' },
        ];

        const DESC_FONTS = [

            { id: 'inter', name: 'Inter', format: 'Legibilidade', neuro: 'Leitura Fluida', family: '"Inter", sans-serif' },
            { id: 'lato', name: 'Lato', format: 'Arredondada', neuro: 'Proximidade', family: '"Lato", sans-serif' },
            { id: 'lora', name: 'Lora', format: 'Suave', neuro: 'Conforto Visual', family: '"Lora", serif' },
        ];

        // --- ARQUITETURA DE FUNIL ---
        const FUNNEL_MODULES = [
            { id: 'banner', stage: 'topo', label: 'Banner de Oferta Exclusiva', desc: 'Atração imediata e Captura de Leads.', icon: 'zap' },
            { id: 'about', stage: 'meio', label: 'Conceito / O Espaço', desc: 'Gera conexão e percepção de valor.', icon: 'users' },
            { id: 'gallery', stage: 'meio', label: 'Portfólio de Resultados', desc: 'Prova visual da sua autoridade.', icon: 'image' },
            { id: 'testimonials', stage: 'fundo', label: 'Selo de Autoridade', desc: 'Prova social para quebra de objeções.', icon: 'message' },
            { id: 'faq', stage: 'fundo', label: 'FAQ Estratégico', desc: 'Elimina dúvidas finais antes da compra.', icon: 'help' },
        ];

        // URLs Estáticas
        const IMG_HERO = "https://images.unsplash.com/photo-1622286342621-4bd786c2447c?auto=format&fit=crop&w=800&q=80"; 
        const IMG_SERVICE_1 = "https://images.unsplash.com/photo-1599305090598-fe179d501227?auto=format&fit=crop&w=400&q=80"; 
        const IMG_SERVICE_2 = "https://images.unsplash.com/photo-1517520286536-160b73df784b?auto=format&fit=crop&w=400&q=80"; 
        const IMG_GALLERY_1 = "https://images.unsplash.com/photo-1621607512214-68297480165e?auto=format&fit=crop&w=300&q=80";
        const IMG_GALLERY_2 = "https://images.unsplash.com/photo-1587314168485-3236d6710814?auto=format&fit=crop&w=300&q=80";
        const IMG_GALLERY_3 = "https://images.unsplash.com/photo-1507652313651-74ff74d3c8fa?auto=format&fit=crop&w=300&q=80";

        const MiniLayoutWireframe = ({ type, color }) => {
            return (
                <div className="w-16 h-12 bg-zinc-950 border border-zinc-800 rounded-md overflow-hidden flex p-1.5 gap-1.5 shrink-0 transition-all">
                {type === 'classic-left' && (
                    <React.Fragment>
                    <div className="flex-1 flex flex-col justify-center gap-1">
                        <div className="h-1.5 w-8 rounded-full transition-colors" style={{ backgroundColor: color }} />
                        <div className="h-1 w-full bg-zinc-700 rounded-full" />
                        <div className="h-1 w-4/5 bg-zinc-700 rounded-full" />
                        <div className="h-2 w-6 mt-1 rounded bg-zinc-600" />
                    </div>
                    <div className="w-6 h-full bg-zinc-800 rounded-sm" />
                    </React.Fragment>
                )}
                {type === 'centered-impact' && (
                    <div className="flex-1 flex flex-col items-center justify-center gap-1">
                    <div className="h-1.5 w-10 rounded-full transition-colors" style={{ backgroundColor: color }} />
                    <div className="h-1 w-10 bg-zinc-700 rounded-full" />
                    <div className="h-2 w-8 mt-1 rounded bg-zinc-600" />
                    </div>
                )}
                {type === 'split-screen' && (
                    <React.Fragment>
                    <div className="w-6 h-full bg-zinc-800 rounded-sm transition-colors" style={{ borderLeft: `2px solid ${color}` }}/>
                    <div className="flex-1 flex flex-col justify-center gap-1">
                        <div className="h-1.5 w-6 rounded-full transition-colors" style={{ backgroundColor: color }} />
                        <div className="h-1 w-full bg-zinc-700 rounded-full" />
                        <div className="h-2 w-6 mt-1 rounded bg-zinc-600" />
                    </div>
                    </React.Fragment>
                )}
                {type === 'immersive-bottom' && (
                    <div className="flex-1 relative bg-zinc-800 rounded-sm p-1 flex flex-col justify-end">
                    <div className="h-1.5 w-8 rounded-full mb-0.5 transition-colors" style={{ backgroundColor: color }} />
                    <div className="h-1 w-full bg-zinc-600 rounded-full" />
                    </div>
                )}
                </div>
            );
        };

        const ImmersiveMockup = memo(({ formData, viewMode }) => {
            const { primaryColor, secondaryColor, accentColor, surfaceColor, titleFont, descFont, heroStyle, sections, services, showWhatsapp } = formData;
            const buttonTextColor = getContrastColor(secondaryColor);
            const desktopRef = useRef(null);
            const mobileRef = useRef(null);

            useEffect(() => {
                if (viewMode === 'desktop' && desktopRef.current) {
                desktopRef.current.scrollTo({ top: desktopRef.current.scrollHeight, behavior: 'smooth' });
                } else if (viewMode === 'mobile' && mobileRef.current) {
                mobileRef.current.scrollTo({ top: mobileRef.current.scrollHeight, behavior: 'smooth' });
                }
            }, [sections, viewMode, services, heroStyle, showWhatsapp]);

            const titleFontFamily = TITLE_FONTS.find(f => f.id === titleFont)?.family || 'sans-serif';
            const descFontFamily = DESC_FONTS.find(f => f.id === descFont)?.family || 'sans-serif';

            return (
                <div className="relative w-full h-full flex items-center justify-center overflow-hidden">
                
                {/* ===================== RENDER: DESKTOP ===================== */}

                        <div className="w-3 h-3 rounded-full bg-green-500/80" />

                        <Icon name="lock" size={10} /> {formData.nome ? formData.nome.toLowerCase().replace(/\s/g, '') : 'glid'}.com.br
                        </div>
                    </div>

                    <div ref={desktopRef} className="flex-1 overflow-y-auto no-scrollbar relative transition-colors duration-500 scroll-smooth" style={{ backgroundColor: primaryColor }}>
                        
                        {/* WPP FLUTUANTE DESKTOP */}

                                <Icon name="whatsapp" size={24} className="text-white" />
                            </div>
                        )}

                        <header className="flex justify-between items-center px-16 py-8 opacity-90">
                        <div className="font-black text-xl uppercase tracking-tighter truncate max-w-[30%]" style={{ color: surfaceColor, fontFamily: titleFontFamily }}>
                            {formData.nome || 'SUA_MARCA'} <span style={{ color: accentColor }}>.</span>
                        </div>
                        <div className="flex gap-8 text-[11px] font-bold tracking-widest uppercase opacity-80" style={{ color: surfaceColor, fontFamily: descFontFamily }}>
                            <span className="hover:opacity-100 cursor-pointer transition-opacity">Início</span>
                            <span className="hover:opacity-100 cursor-pointer transition-opacity">Serviços</span>
                            <span className="hover:opacity-100 cursor-pointer transition-opacity">Portfólio</span>
                            <span style={{ color: accentColor }} className="hover:opacity-80 cursor-pointer transition-opacity">Agendar</span>
                        </div>
                        </header>

                        {/* HERO SECTION DESKTOP */}
                        <div className="px-16 py-12 flex items-center min-h-[350px]">
                        {heroStyle === 'classic-left' && (
                            <div className="flex w-full gap-12 items-center">
                                <div className="w-1/2 flex flex-col items-start text-left max-w-full">
                                    <div className="h-1.5 w-16 mb-6 rounded-full transition-colors duration-700" style={{ backgroundColor: accentColor }} />
                                    <h5 className="text-5xl lg:text-[3.5rem] leading-[1.0] font-black tracking-tighter uppercase mb-3 drop-shadow-lg break-words w-full" style={{ color: surfaceColor, fontFamily: titleFontFamily }}>
                                        {formData.nome || 'Sua Assinatura'}
                                    </h5>
                                    <div className="text-sm lg:text-base uppercase tracking-widest mb-6 font-light transition-colors duration-700 break-words w-full" style={{ color: accentColor, fontFamily: descFontFamily }}>
                                        {formData.nicho || 'SEU POSICIONAMENTO AQUI'}
                                    </div>
                                    <div className="space-y-3 w-4/5 opacity-70 mb-10 text-sm font-light leading-relaxed" style={{ color: surfaceColor, fontFamily: descFontFamily }}>
                                        A excelência do seu espaço físico traduzida em uma experiência digital imersiva. Descubra a nossa assinatura.
                                    </div>
                                    <div className="h-14 px-10 rounded-lg flex items-center justify-center text-xs font-black tracking-[0.2em] uppercase cursor-pointer glass-button" style={{ backgroundColor: secondaryColor, color: buttonTextColor, fontFamily: descFontFamily }}>
                                        Agendar Experiência
                                    </div>
                                </div>
                                <div className="w-1/2 h-72 rounded-2xl opacity-80 border border-white/5 bg-cover bg-center shadow-2xl shrink-0" style={{ backgroundImage: `url(${IMG_HERO})` }} />
                            </div>
                        )}

                        {heroStyle === 'centered-impact' && (
                            <div className="w-full flex flex-col items-center text-center justify-center max-w-full px-8">
                                <div className="h-1.5 w-16 mb-6 rounded-full transition-colors duration-700" style={{ backgroundColor: accentColor }} />
                                <h5 className="text-5xl lg:text-6xl leading-[1.0] font-black tracking-tighter uppercase mb-4 drop-shadow-lg break-words w-full" style={{ color: surfaceColor, fontFamily: titleFontFamily }}>
                                    {formData.nome || 'Sua Assinatura'}
                                </h5>
                                <div className="text-base lg:text-lg uppercase tracking-widest mb-6 font-light transition-colors duration-700 break-words w-full" style={{ color: accentColor, fontFamily: descFontFamily }}>
                                    {formData.nicho || 'SEU POSICIONAMENTO AQUI'}
                                </div>
                                <div className="space-y-3 w-3/4 mx-auto opacity-70 mb-10 text-sm font-light leading-relaxed" style={{ color: surfaceColor, fontFamily: descFontFamily }}>
                                    A excelência do seu espaço físico traduzida em uma experiência digital imersiva.
                                </div>
                                <div className="h-16 px-12 rounded-2xl flex items-center justify-center text-xs font-black tracking-[0.2em] uppercase cursor-pointer glass-button" style={{ backgroundColor: secondaryColor, color: buttonTextColor, fontFamily: descFontFamily }}>
                                    Agendar Experiência
                                </div>
                            </div>
                        )}

                        {heroStyle === 'split-screen' && (
                            <div className="flex w-full h-[350px] rounded-3xl overflow-hidden border border-white/5 shadow-2xl">
                                <div className="w-1/2 h-full opacity-80 flex items-end p-8 bg-cover bg-center transition-all duration-700" style={{ borderLeft: `6px solid ${accentColor}`, backgroundImage: `url(${IMG_HERO})` }}>
                                </div>
                                <div className="w-1/2 h-full flex flex-col justify-center p-12 bg-black/40 backdrop-blur-md max-w-full">
                                    <h5 className="text-4xl lg:text-5xl leading-[1.0] font-black tracking-tighter uppercase mb-3 drop-shadow-md break-words w-full" style={{ color: surfaceColor, fontFamily: titleFontFamily }}>
                                        {formData.nome || 'Sua Assinatura'}
                                    </h5>
                                    <div className="text-xs lg:text-sm uppercase tracking-widest font-light transition-colors duration-700 break-words w-full" style={{ color: accentColor, fontFamily: descFontFamily }}>
                                        {formData.nicho || 'SEU POSICIONAMENTO AQUI'}
                                    </div>
                                    <div className="h-14 w-56 rounded-lg flex items-center justify-center text-[10px] font-black tracking-[0.2em] uppercase mt-8 cursor-pointer glass-button" style={{ backgroundColor: secondaryColor, color: buttonTextColor, fontFamily: descFontFamily }}>
                                        Iniciar Atendimento
                                    </div>
                                </div>
                            </div>
                        )}

                        {heroStyle === 'immersive-bottom' && (
                            <div className="w-full h-[400px] rounded-3xl relative overflow-hidden flex items-end p-12 opacity-90 bg-cover bg-center shadow-2xl border border-white/5" style={{ backgroundImage: `url(${IMG_HERO})` }}>
                                <div className="absolute inset-0 bg-gradient-to-t from-black via-black/60 to-transparent" />
                                <div className="relative z-10 w-full flex justify-between items-end gap-6">
                                    <div className="flex-1 max-w-full">
                                        <h5 className="text-5xl lg:text-6xl leading-[1.0] font-black tracking-tighter uppercase mb-3 drop-shadow-lg break-words w-full" style={{ color: surfaceColor, fontFamily: titleFontFamily }}>
                                            {formData.nome || 'Sua Assinatura'}
                                        </h5>
                                        <div className="text-sm lg:text-base uppercase tracking-widest font-light transition-colors duration-700 break-words w-full" style={{ color: accentColor, fontFamily: descFontFamily }}>
                                            {formData.nicho || 'SEU POSICIONAMENTO AQUI'}
                                        </div>
                                    </div>
                                    <div className="h-16 px-10 rounded-xl flex items-center justify-center text-xs font-black tracking-[0.2em] uppercase cursor-pointer glass-button shrink-0" style={{ backgroundColor: secondaryColor, color: buttonTextColor, fontFamily: descFontFamily }}>
                                        Agendar Agora
                                    </div>
                                </div>
                            </div>
                        )}

                            </div>
                        </div>

                        <button onClick={() => formData.nome && formData.nicho && triggerHaptic(2)} disabled={!formData.nome || !formData.nicho} className="w-full py-5 lg:py-6 bg-zinc-100 text-black font-black rounded-2xl uppercase tracking-widest text-xs disabled:opacity-20 transition-opacity mt-4 focus:ring-4 focus:ring-white/30 outline-none">
                            Avançar DNA Visual
                        </button>
                        </div>
                    )}

                    {step === 2 && (
                        <div className="space-y-8 lg:space-y-10 animate-in fade-in slide-in-from-right-8 duration-500 pb-20">
                        <div className="space-y-2">
                            <h3 className="text-3xl lg:text-4xl font-black uppercase italic tracking-tighter text-zinc-100">02. Identidade Visual</h3>
                            <p className="text-zinc-400 text-xs lg:text-sm italic">Defina as cores e a voz tipográfica focada em conversão.</p>
                        </div>

                        <div className="space-y-4">
                            <div className="bg-zinc-900/70 p-5 rounded-2xl border border-zinc-800 shadow-sm flex items-center justify-between gap-4 focus-within:ring-2 focus-within:ring-lime-400/30 transition-all">
                                <div className="flex-1">
                                    <label htmlFor="color-primary" className="text-[10px] font-black uppercase italic tracking-widest text-lime-400 block mb-1 cursor-pointer">Fundo da Página</label>
                                    <p className="text-[9px] text-zinc-500">A base do seu posicionamento.</p>
                                </div>
                                <input id="color-primary" type="color" value={formData.primaryColor} onChange={(e) => setFormData({...formData, primaryColor: e.target.value})} className="w-12 h-12 bg-transparent cursor-pointer rounded-lg overflow-hidden shrink-0 outline-none" />
                            </div>

                            <div className="bg-zinc-900/40 p-5 rounded-2xl border border-zinc-800 flex items-center justify-between gap-4 focus-within:ring-2 focus-within:ring-lime-400/30 transition-all">
                                <div className="flex-1">
                                    <label htmlFor="color-secondary" className="text-[10px] font-black uppercase italic tracking-widest text-zinc-300 block mb-1 cursor-pointer flex items-center gap-2">
                                        Botões CTA <span className="bg-lime-400/10 text-lime-400 px-1.5 py-0.5 rounded text-[8px]">Conversão +34%</span>
                                    </label>
                                    <p className="text-[9px] text-zinc-500">Tons quentes e vibrantes guiam o clique.</p>
                                </div>
                                <input id="color-secondary" type="color" value={formData.secondaryColor} onChange={(e) => setFormData({...formData, secondaryColor: e.target.value})} className="w-10 h-10 bg-transparent cursor-pointer shrink-0 outline-none" />
                            </div>

                            <div className="bg-zinc-900/40 p-5 rounded-2xl border border-zinc-800 flex items-center justify-between gap-4 focus-within:ring-2 focus-within:ring-lime-400/30 transition-all">
                                <div className="flex-1">
                                    <label htmlFor="color-accent" className="text-[10px] font-black uppercase italic tracking-widest text-zinc-300 block mb-1 cursor-pointer">Cor de Acento (Detalhes)</label>
                                    <p className="text-[9px] text-zinc-500">Destaques secundários e ícones.</p>
                                </div>
                                <input id="color-accent" type="color" value={formData.accentColor} onChange={(e) => setFormData({...formData, accentColor: e.target.value})} className="w-10 h-10 bg-transparent cursor-pointer shrink-0 outline-none" />
                            </div>
                        </div>

                        <div className="space-y-6 pt-4 border-t border-zinc-900">
                            <div>
                                <label className="text-[10px] font-black uppercase italic text-zinc-500 block mb-3 tracking-widest flex items-center gap-2"><Icon name="heading" size={14} /> Tipografia de Títulos</label>
                                <div className="grid grid-cols-2 gap-2 pr-2">
                                    {TITLE_FONTS.map(f => (
                                    <button key={f.id} onClick={() => setFormData({...formData, titleFont: f.id})} className={`p-3 rounded-xl border text-left transition-all outline-none focus:ring-2 focus:ring-lime-400/50 flex flex-col justify-center h-[76px] ${formData.titleFont === f.id ? 'border-lime-400 bg-lime-400/10' : 'border-zinc-800 bg-zinc-900/30 hover:border-zinc-600'}`}>
                                        <div className={`font-black text-[11px] uppercase tracking-tighter ${formData.titleFont === f.id ? 'text-lime-400' : 'text-zinc-200'}`}>{f.name}</div>
                                        <div className="text-[8px] text-zinc-500 mt-1 italic">{f.neuro}</div>
                                    </button>
                                    ))}
                                </div>
                            </div>

                            <div>
                                <label className="text-[10px] font-black uppercase italic text-zinc-500 block mb-3 tracking-widest flex items-center gap-2"><Icon name="type" size={14} /> Tipografia de Textos (Leitura)</label>
                                <div className="grid grid-cols-2 gap-2">
                                    {DESC_FONTS.map(f => (
                                    <button key={f.id} onClick={() => setFormData({...formData, descFont: f.id})} className={`p-3 rounded-xl border text-left transition-all outline-none focus:ring-2 focus:ring-lime-400/50 flex flex-col justify-center h-[76px] ${formData.descFont === f.id ? 'border-lime-400 bg-lime-400/10' : 'border-zinc-800 bg-zinc-900/30 hover:border-zinc-600'}`}>
                                        <div className={`font-black text-[10px] uppercase tracking-tighter ${formData.descFont === f.id ? 'text-lime-400' : 'text-zinc-200'}`}>{f.name}</div>
                                        <div className="text-[8px] text-zinc-500 mt-1 italic">{f.neuro}</div>
                                    </button>
                                    ))}
                                </div>
                            </div>
                        </div>

                        <div className="flex justify-between items-center pt-4 lg:pt-6 border-t border-zinc-900">
                            <button onClick={() => setStep(1)} className="text-zinc-500 hover:text-zinc-300 text-[10px] font-black uppercase italic focus:outline-none">Voltar</button>
                            <button onClick={() => triggerHaptic(3)} className="px-8 lg:px-10 py-4 lg:py-5 bg-lime-400 text-black font-black rounded-2xl uppercase italic text-[10px] lg:text-xs shadow-lg shadow-lime-400/20 focus:ring-4 focus:ring-lime-400/30 outline-none">Avançar Funil</button>
                        </div>
                        </div>
                    )}

                    {step === 3 && (
                        <div className="space-y-8 lg:space-y-10 animate-in fade-in slide-in-from-right-8 duration-500 pb-12">
                        <div className="space-y-2">
                            <h3 className="text-3xl lg:text-4xl font-black uppercase italic tracking-tighter text-zinc-100">03. O Impacto</h3>
                            <p className="text-zinc-400 text-xs italic">Escolha como a dobra principal (Hero) será estruturada.</p>
                        </div>

                        <div className="grid grid-cols-1 gap-4 lg:gap-5">
                            {[
                            { id: 'classic-left', label: 'Elegância Lateral', desc: 'Logo e textos à esquerda. Leitura em formato Z.' },
                            { id: 'centered-impact', label: 'Impacto Central', desc: 'Tudo centralizado. Autoridade direta.' },
                            { id: 'split-screen', label: 'Tela Dividida', desc: 'Imagem de um lado, texto do outro.' },
                            { id: 'immersive-bottom', label: 'Imersivo', desc: 'Imagem ocupando 100% da tela, textos no rodapé.' },
                            ].map(l => (
                            <button 
                                key={l.id}
                                onClick={() => setFormData({...formData, heroStyle: l.id})}
                                className={`p-4 lg:p-5 rounded-2xl border text-left transition-all flex items-center gap-4 group focus:ring-2 focus:ring-lime-400/50 outline-none ${formData.heroStyle === l.id ? 'border-lime-400 bg-lime-400/10 shadow-[0_0_20px_rgba(163,230,53,0.1)]' : 'border-zinc-800 hover:bg-zinc-900/80 hover:border-zinc-600'}`}
                            >
                                <MiniLayoutWireframe type={l.id} color={formData.heroStyle === l.id ? formData.accentColor : '#52525b'} />
                                <div className="flex-1">
                                <div className={`font-black text-xs uppercase italic tracking-widest transition-colors ${formData.heroStyle === l.id ? 'text-lime-400' : 'text-zinc-100 group-hover:text-white'}`}>{l.label}</div>
                                </div>
                            </button>
                            ))}
                        </div>

                        <div className="flex justify-between items-center pt-6">
                            <button onClick={() => setStep(2)} className="text-zinc-500 hover:text-zinc-300 text-[10px] font-black uppercase italic focus:outline-none">Voltar</button>
                            <button onClick={() => triggerHaptic(4)} className="px-8 lg:px-10 py-4 lg:py-5 bg-lime-400 text-black font-black rounded-2xl uppercase italic text-[10px] lg:text-xs shadow-lg shadow-lime-400/20 focus:ring-4 focus:ring-lime-400/30 outline-none">Construir Funil</button>
                        </div>
                        </div>
                    )}

                    {step === 4 && (
                        <div className="space-y-8 lg:space-y-10 animate-in fade-in slide-in-from-right-8 duration-500 pb-12">
                        <div className="space-y-2">
                            <div className="inline-flex items-center gap-2 px-3 py-1 bg-lime-400/20 border border-lime-400/40 rounded-full text-[8px] lg:text-[9px] font-black text-lime-400 uppercase tracking-widest italic mb-2">
                            <Icon name="layers" size={10} /> Arquitetura de Funil
                            </div>
                            <h3 className="text-3xl lg:text-4xl font-black uppercase italic tracking-tighter text-zinc-100">04. Blocos de Vendas</h3>
                            <p className="text-zinc-400 text-xs italic">Organize o que entra no Topo, Meio e Fundo do seu funil digital.</p>
                        </div>

                        {/* MÓDULOS AGRUPADOS POR FUNIL */}
                        <div className="space-y-8">
                            
                            {/* TOPO DE FUNIL */}
                            <div className="space-y-3">
                                <h5 className="text-[10px] font-black uppercase tracking-widest text-lime-400 flex items-center gap-2"><Icon name="zap" size={12} /> Topo de Funil (Atração)</h5>
                                {FUNNEL_MODULES.filter(m => m.stage === 'topo').map(module => {
                                    const isActive = formData.sections.includes(module.id);
                                    return (
                                        <button 
                                            key={module.id} onClick={() => toggleSection(module.id)}
                                            className={`w-full p-4 rounded-2xl border text-left transition-all flex items-center justify-between group outline-none focus:ring-2 focus:ring-lime-400/50 ${isActive ? 'border-lime-400 bg-lime-400/5 shadow-[0_0_15px_rgba(163,230,53,0.05)]' : 'border-zinc-800 bg-zinc-900/30 hover:border-zinc-600'}`}
                                        >
                                            <div className="flex items-center gap-3">
                                                <div className={`p-2 rounded-xl transition-colors flex items-center justify-center ${isActive ? 'bg-lime-400 text-black shadow-md' : 'bg-zinc-800 text-zinc-400'}`}>
                                                    <Icon name={module.icon} size={16} />
                                                </div>
                                                <div>
                                                    <div className={`font-black text-[10px] uppercase tracking-widest italic transition-colors ${isActive ? 'text-zinc-100' : 'text-zinc-400 group-hover:text-zinc-200'}`}>{module.label}</div>
                                                    <div className="text-[8px] text-zinc-500 mt-1">{module.desc}</div>
                                                </div>
                                            </div>
                                            <div className={`w-5 h-5 rounded-full border flex items-center justify-center transition-colors ${isActive ? 'bg-lime-400 border-lime-400 text-black' : 'border-zinc-700 text-transparent'}`}>
                                                <Icon name="check" size={12} strokeWidth={3} />
                                            </div>
                                        </button>
                                    )
                                })}
                            </div>

                            {/* MEIO DE FUNIL */}
                            <div className="space-y-3">
                                <h5 className="text-[10px] font-black uppercase tracking-widest text-lime-400 flex items-center gap-2"><Icon name="users" size={12} /> Meio de Funil (Conexão)</h5>
                                {FUNNEL_MODULES.filter(m => m.stage === 'meio').map(module => {
                                    const isActive = formData.sections.includes(module.id);
                                    return (
                                        <button 
                                            key={module.id} onClick={() => toggleSection(module.id)}
                                            className={`w-full p-4 rounded-2xl border text-left transition-all flex items-center justify-between group outline-none focus:ring-2 focus:ring-lime-400/50 ${isActive ? 'border-lime-400 bg-lime-400/5 shadow-[0_0_15px_rgba(163,230,53,0.05)]' : 'border-zinc-800 bg-zinc-900/30 hover:border-zinc-600'}`}
                                        >
                                            <div className="flex items-center gap-3">
                                                <div className={`p-2 rounded-xl transition-colors flex items-center justify-center ${isActive ? 'bg-lime-400 text-black shadow-md' : 'bg-zinc-800 text-zinc-400'}`}>
                                                    <Icon name={module.icon} size={16} />
                                                </div>
                                                <div>
                                                    <div className={`font-black text-[10px] uppercase tracking-widest italic transition-colors ${isActive ? 'text-zinc-100' : 'text-zinc-400 group-hover:text-zinc-200'}`}>{module.label}</div>
                                                    <div className="text-[8px] text-zinc-500 mt-1">{module.desc}</div>
                                                </div>
                                            </div>
                                            <div className={`w-5 h-5 rounded-full border flex items-center justify-center transition-colors ${isActive ? 'bg-lime-400 border-lime-400 text-black' : 'border-zinc-700 text-transparent'}`}>
                                                <Icon name="check" size={12} strokeWidth={3} />
                                            </div>
                                        </button>
                                    )
                                })}
                            </div>

                            {/* FUNDO DE FUNIL */}
                            <div className="space-y-3">
                                <h5 className="text-[10px] font-black uppercase tracking-widest text-lime-400 flex items-center gap-2"><Icon name="message" size={12} /> Fundo de Funil (Conversão)</h5>
                                
                                {/* TOGGLE WHATSAPP (Ação Direta) */}
                                <div className="w-full p-4 rounded-2xl border border-zinc-800 bg-zinc-900/30 flex items-center justify-between group transition-all hover:border-zinc-600">
                                    <div className="flex items-center gap-3">
                                        <div className={`p-2 rounded-xl transition-colors flex items-center justify-center ${formData.showWhatsapp ? 'bg-[#25D366] text-white shadow-md' : 'bg-zinc-800 text-zinc-400'}`}>
                                            <Icon name="whatsapp" size={16} />
                                        </div>
                                        <div>
                                            <div className="font-black text-[10px] uppercase tracking-widest italic text-zinc-100">Botão WhatsApp Flutuante</div>
                                            <div className="text-[8px] text-zinc-500 mt-1">Converte dúvidas rapidamente.</div>
                                        </div>
                                    </div>
                                    
                                    {/* Toggle Switch */}
                                    <div className="relative inline-block w-10 mr-2 align-middle select-none transition duration-200 ease-in">
                                        <input type="checkbox" name="toggle" id="whatsapp-toggle" checked={formData.showWhatsapp} onChange={() => setFormData({...formData, showWhatsapp: !formData.showWhatsapp})} className="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 border-zinc-500 appearance-none cursor-pointer z-10 top-0 left-0 transition-all duration-300 outline-none" />
                                        <label htmlFor="whatsapp-toggle" className="toggle-label block overflow-hidden h-5 rounded-full bg-zinc-700 cursor-pointer transition-colors duration-300"></label>
                                    </div>
                                </div>

                                {FUNNEL_MODULES.filter(m => m.stage === 'fundo').map(module => {
                                    const isActive = formData.sections.includes(module.id);
                                    return (
                                        <button 
                                            key={module.id} onClick={() => toggleSection(module.id)}
                                            className={`w-full p-4 rounded-2xl border text-left transition-all flex items-center justify-between group outline-none focus:ring-2 focus:ring-lime-400/50 ${isActive ? 'border-lime-400 bg-lime-400/5 shadow-[0_0_15px_rgba(163,230,53,0.05)]' : 'border-zinc-800 bg-zinc-900/30 hover:border-zinc-600'}`}
                                        >
                                            <div className="flex items-center gap-3">
                                                <div className={`p-2 rounded-xl transition-colors flex items-center justify-center ${isActive ? 'bg-lime-400 text-black shadow-md' : 'bg-zinc-800 text-zinc-400'}`}>
                                                    <Icon name={module.icon} size={16} />
                                                </div>
                                                <div>
                                                    <div className={`font-black text-[10px] uppercase tracking-widest italic transition-colors ${isActive ? 'text-zinc-100' : 'text-zinc-400 group-hover:text-zinc-200'}`}>{module.label}</div>
                                                    <div className="text-[8px] text-zinc-500 mt-1">{module.desc}</div>
                                                </div>
                                            </div>
                                            <div className={`w-5 h-5 rounded-full border flex items-center justify-center transition-colors ${isActive ? 'bg-lime-400 border-lime-400 text-black' : 'border-zinc-700 text-transparent'}`}>
                                                <Icon name="check" size={12} strokeWidth={3} />
                                            </div>
                                        </button>
                                    )
                                })}

                                {/* GERENCIADOR DE SERVIÇOS */}
                                <div className="bg-zinc-900/50 border border-zinc-800 rounded-2xl p-5 mt-4 shadow-inner">
                                    <h4 className="text-[10px] font-black uppercase italic text-lime-400 mb-3 tracking-widest">Tabela de Comando: Serviços</h4>
                                    <div className="space-y-3 mb-4 max-h-56 overflow-y-auto pr-2 no-scrollbar">
                                        {formData.services.map((srv, index) => (
                                            <div key={srv.id} className="flex gap-2 items-center bg-black/40 p-2 rounded-xl border border-zinc-800 focus-within:border-lime-400/50 transition-colors group">
                                                <div className="flex-1 flex flex-col gap-1">
                                                    <input 
                                                        type="text" 
                                                        placeholder="Ex: Corte, Liso 5D, Design..."
                                                        value={srv.title}
                                                        onChange={(e) => updateService(srv.id, 'title', e.target.value)}
                                                        className="bg-transparent border-b border-transparent hover:border-zinc-700 text-xs font-bold text-white px-2 py-1 focus:outline-none focus:border-lime-400 transition-colors uppercase w-full"
                                                        aria-label="Nome do Serviço"
                                                    />
                                                    <div className="flex items-center gap-1 px-2">
                                                        <span className="text-[10px] text-zinc-500 font-black">R$</span>
                                                        <input 
                                                            type="number" 
                                                            placeholder="Valor"
                                                            value={srv.price}
                                                            onChange={(e) => updateService(srv.id, 'price', e.target.value)}
                                                            className="bg-transparent text-xs font-mono text-lime-400 py-1 focus:outline-none w-full"
                                                            aria-label="Preço do Serviço"
                                                            min="0"
                                                        />
                                                    </div>
                                                </div>
                                                <button onClick={() => removeService(srv.id)} className="p-3 text-zinc-600 hover:text-red-500 hover:bg-red-500/10 rounded-lg transition-all focus:outline-none focus:ring-2 focus:ring-red-500/50" aria-label="Remover Serviço">
                                                    <Icon name="trash" size={16} />
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                    <button onClick={addService} className="w-full py-3 bg-zinc-800 hover:bg-zinc-700 hover:text-white text-zinc-300 text-[10px] font-black uppercase tracking-widest rounded-xl transition-all flex items-center justify-center gap-2 focus:outline-none focus:ring-2 focus:ring-zinc-500 shadow-md">
                                        <Icon name="plus" size={14} /> Adicionar Serviço
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div className="flex justify-between items-center pt-6 lg:pt-8 border-t border-zinc-900 mt-8">
                            <button onClick={() => setStep(3)} className="text-zinc-500 hover:text-zinc-300 text-[10px] font-black uppercase italic focus:outline-none">Voltar</button>
                            <button onClick={() => triggerHaptic(5)} className="px-8 lg:px-10 py-4 lg:py-5 bg-white text-black font-black rounded-2xl uppercase italic text-[10px] lg:text-xs shadow-xl focus:ring-4 focus:ring-white/30 outline-none">Revisar & Finalizar</button>
                        </div>
                        </div>
                    )}

                    {step === 5 && (
                        <div className="space-y-8 lg:space-y-10 animate-in fade-in slide-in-from-right-8 duration-500 text-center py-10 lg:py-16 pb-12">
                        <div className="p-6 lg:p-8 bg-lime-400/10 border border-lime-400/30 rounded-full inline-block mb-2 lg:mb-4 shadow-[0_0_40px_rgba(163,230,53,0.15)]">
                            <Icon name="shieldCheck" size={48} className="text-lime-400" />
                        </div>
                        <h3 className="text-4xl lg:text-[3.5rem] leading-[0.9] font-black italic uppercase tracking-tighter text-zinc-100">Posicionamento <br/> Concluído.</h3>
                        <p className="text-zinc-400 max-w-[280px] mx-auto text-xs lg:text-sm italic leading-relaxed">
                            Design System e Estrutura de Funil definidos no padrão GL Pro.
                        </p>
                        
                        <button 
                            onClick={handleExportJSON}
                            disabled={isExporting}
                            className="w-full py-5 lg:py-6 bg-lime-400 text-black font-black rounded-3xl text-xs lg:text-sm uppercase tracking-widest italic shadow-xl shadow-lime-400/20 hover:scale-[1.02] active:scale-95 transition-all mt-6 lg:mt-8 flex items-center justify-center gap-3 disabled:opacity-50 focus:ring-4 focus:ring-lime-400/30 outline-none"
                        >
                            {isExporting ? (
                                <React.Fragment> <Icon name="refresh" size={16} className="animate-spin" /> Gerando Blueprint... </React.Fragment>
                            ) : (
                                <React.Fragment> <Icon name="download" size={16} /> Exportar Arquivo JSON </React.Fragment>
                            )}
                        </button>
                        </div>
                    )}
                    </section>

                    {/* LADO DIREITO: MOCKUP OMNICHANNEL */}
                    <section className="hidden landscape:flex lg:flex w-full lg:col-span-7 flex-col items-center justify-center bg-[#050505] h-full overflow-hidden relative">
                    
                    <div className="absolute top-8 right-12 z-50 flex items-center bg-zinc-900/90 border border-zinc-800 rounded-full p-1 backdrop-blur-xl shadow-2xl">
                        <button 
                        onClick={() => setViewMode('mobile')} 
                        className={`flex items-center gap-2 px-4 py-2 rounded-full text-[9px] font-black uppercase tracking-widest transition-all focus:outline-none focus:ring-2 focus:ring-lime-400/50 ${viewMode === 'mobile' ? 'bg-zinc-800 text-lime-400 shadow-sm' : 'text-zinc-500 hover:text-white'}`}
                        >
                        <Icon name="smartphone" size={14} /> Celular
                        </button>
                        <button 
                        onClick={() => setViewMode('desktop')} 
                        className={`flex items-center gap-2 px-4 py-2 rounded-full text-[9px] font-black uppercase tracking-widest transition-all focus:outline-none focus:ring-2 focus:ring-lime-400/50 ${viewMode === 'desktop' ? 'bg-zinc-800 text-lime-400 shadow-sm' : 'text-zinc-500 hover:text-white'}`}
                        >
                        <Icon name="monitor" size={14} /> Computador
                        </button>
                    </div>

                    <ImmersiveMockup formData={formData} viewMode={viewMode} />
                    </section>

                </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
